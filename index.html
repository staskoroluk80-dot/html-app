<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Clicker Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .phone {
            position: relative;
            width: 300px;
            height: 600px;
            background-color: #87ceeb; /* light blue */
            /* background: url('background.jpg') center/cover no-repeat; */
            border: 16px solid #000;
            border-radius: 40px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
            cursor: pointer;
        }
        .phone .pin {
            position: absolute;
            width: 80px;
            height: 80px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .phone .counter {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 2em;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="phone" id="phoneContainer">
        <img src="pin.png" alt="pin" class="pin" />
        <div class="counter" id="counter">0</div>
    </div>

    <script>
        const phone = document.getElementById('phoneContainer');
        const counterEl = document.getElementById('counter');
        let count = 0;

        phone.addEventListener('click', () => {
            count += 1;
            counterEl.textContent = count;
        });
    </script>
</body>
</html>
